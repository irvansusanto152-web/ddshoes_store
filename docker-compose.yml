# Catatan untuk Coolify:
# - Coolify handle Nginx, SSL, dan domain secara otomatis
# - Service nginx TIDAK digunakan di sini
# - Coolify akan proxy traffic ke port 8000 container ini
# - Set environment variables via Coolify dashboard, bukan file .env

services:
  web:
    build: .
    container_name: pos_ddshoes_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - media_volume:/app/media      # Foto produk — JANGAN dihapus
      - db_volume:/app/data          # Database SQLite — JANGAN dihapus
      # staticfiles TIDAK di-mount — sudah baked ke image saat build (collectstatic di Dockerfile)
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  media_volume:   # Persistent: foto produk upload
  db_volume:      # Persistent: database SQLite
