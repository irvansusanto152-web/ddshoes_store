<div class="container-fluid">
    <form action="" id="category-form">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ category.id|default:'' }}">
        <div class="form-group mb-3">
            <label for="name" class="control-label mb-1 fw-bold text-secondary">Nama Kategori</label>
            <input type="text" name="name" id="name" class="form-control form-control-lg saas-input" value="{{ category.name|default:'' }}" required placeholder="Contoh: Sneakers">
        </div>
    </form>
</div>

<script>
    $(function() {
        $('#category-form').submit(function(e) {
            e.preventDefault();
            var _this = $(this);
            start_loader();
            $.ajax({
                url: "{% url 'categories_save' %}",
                data: new FormData($(this)[0]),
                cache: false,
                contentType: false,
                processData: false,
                method: 'POST',
                type: 'POST',
                success: function(resp) {
                    if (resp.status == 'success') {
                        location.reload();
                    } else {
                        showAlert("Terjadi kesalahan saat menyimpan data.");
                        end_loader();
                    }
                }
            });
        });
    });
</script>
