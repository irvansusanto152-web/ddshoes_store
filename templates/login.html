{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DD Shoes POS</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* WRAPPER */
        body.login-body { font-family:'Inter',sans-serif; overflow:hidden; background:#f8fafc; height:100vh; margin: 0; }
        .auth-wrapper   { display:flex; height:100%; width:100%; }

        /* SISI KIRI — HERO */
        .auth-image-side {
            flex: 1.3; position:relative; background:#0f172a;
            overflow:hidden; display:flex; flex-direction:column;
            justify-content:space-between; padding:60px;
        }
        .auth-image-side::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 1;
            animation: imageZoomIn 2s ease-out forwards;
        }
        .auth-image-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(15,23,42,0.4) 0%, rgba(15,23,42,0.9) 100%);
            z-index: 2;
        }

        .auth-image-content { position: relative; z-index: 3; color: white; }
        .auth-image-footer { position: relative; z-index: 3; }

        @keyframes imageZoomIn {
            from { transform: scale(1.08); }
            to { transform: scale(1); }
        }

        /* SISI KANAN — FORM */
        .auth-form-side { flex:1; background:#fff; display:flex; align-items:center; justify-content:center; padding:40px; }
        .auth-form-box  { width:100%; max-width:400px; animation:formSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }

        @keyframes formSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORM HEADER */
        .form-header h2 { font-size:2rem; font-weight:800; color:#0f172a; letter-spacing:-1px; margin-bottom: 8px; }
        .form-header p  { font-size:1rem; color:#64748b; margin-bottom: 32px; }

        /* INPUT GRUP */
        .saas-input-group { position:relative; margin-bottom: 20px; }
        .saas-input-group i { position:absolute; left:16px; top:14px; color:#94a3b8; font-size:20px; }
        .saas-input {
            width:100%; padding:14px 16px 14px 48px; height:52px;
            border:2px solid #e2e8f0; border-radius:14px;
            font-family:'Inter',sans-serif; font-size:1rem; font-weight:500;
            background:#f8fafc; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .saas-input:focus { border-color:#4f46e5; background:#fff; box-shadow:0 0 0 4px #e0e7ff; outline: none; }

        /* TOMBOL SUBMIT */
        .btn-masuk {
            all:unset; display:flex; align-items:center; justify-content:center; gap:8px;
            background:#4f46e5; color:#fff; padding:14px 20px; border-radius:14px;
            font-weight:700; font-size:1.05rem; cursor:pointer; width:100%; box-sizing: border-box;
            box-shadow:0 4px 12px rgba(79,70,229,0.2); transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            margin-top: 24px;
        }
        .btn-masuk:hover { background:#4338ca; transform:translateY(-2px); box-shadow:0 8px 20px rgba(79,70,229,0.35); }
        .btn-masuk i     { font-size:20px; transition:transform 0.3s ease; }
        .btn-masuk:hover i { transform:translateX(6px); }

        /* GLASSMORPHISM BADGE (di sisi kiri bawah) */
        .glass-badge {
            display:inline-flex; align-items:center; gap:12px;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.2); padding:12px 20px; border-radius:100px;
        }

        @media (max-width: 992px) {
            .auth-image-side { display: none; }
        }
    </style>
</head>
<body class="login-body">
    <div class="auth-wrapper">
        <!-- Hero Section (Left) -->
        <div class="auth-image-side">
            <div class="auth-image-content">
                <h1 style="font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 0;">DD SHOES</h1>
                <p style="font-weight: 500; letter-spacing: 2px; color: #94a3b8;">POINT OF SALES</p>
            </div>
            
            <div class="auth-image-footer">
                <div class="glass-badge">
                    <i class="material-icons" style="color: #4ade80;">security</i>
                    <span style="color: white; font-weight: 500; font-size: 0.9rem;">Secure Authentication System</span>
                </div>
            </div>
        </div>

        <!-- Form Section (Right) -->
        <div class="auth-form-side">
            <div class="auth-form-box">
                <div class="form-header">
                    <h2>Selamat Datang</h2>
                    <p>Silakan masuk ke akun Anda.</p>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="border-radius: 12px; font-size: 0.9rem;">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="saas-input-group">
                        <i class="material-icons">person</i>
                        <input type="text" name="username" class="saas-input" placeholder="Username" required autofocus>
                    </div>
                    
                    <div class="saas-input-group">
                        <i class="material-icons">lock</i>
                        <input type="password" name="password" class="saas-input" placeholder="Password" required>
                    </div>
                    
                    <button type="submit" class="btn-masuk">
                        Masuk <i class="material-icons">arrow_forward</i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
